    <!-- 3. LÓGICA DE CONEXIÓN Y ANIMACIÓN (JAVASCRIPT) -->
    <script>
        const colabUrl = '<?php echo esc_url($url_api_colab); ?>';

        function toggleGeminiChat() {
            const chatWindow = document.getElementById('gemini-chat-window');
            chatWindow.classList.toggle('gemini-chat-hidden');
            scrollToBottom();
        }

        function checkGeminiEnter(event) {
            if (event.key === 'Enter') {
                sendGeminiMessage();
            }
        }

        async function sendGeminiMessage() {
            const inputElement = document.getElementById('gemini-chat-input');
            const messageText = inputElement.value.trim();
            
            if (messageText === '') return;

            // Limpiar input
            inputElement.value = '';

            // 1. Mostrar mensaje del usuario en pantalla
            appendMessage(messageText, 'user-msg');
            
            // 2. Mostrar indicador de "Pensando..."
            const loadingId = appendMessage('Escribiendo...', 'bot-msg loading-msg');
            scrollToBottom();

            try {
                // 3. Petición POST directa al servidor FastAPI en Google Colab
                const response = await fetch(colabUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: messageText })
                });

                if (!response.ok) {
                    throw new Error('Error en la respuesta del servidor');
                }

                const data = await response.json();
                
                // Quitar indicador de carga y mostrar respuesta de Gemini
                removeMessage(loadingId);
                appendMessage(data.reply, 'bot-msg');

            } catch (error) {
                console.error('Error:', error);
                removeMessage(loadingId);
                appendMessage('Lo siento, hubo un problema al conectar con el asistente. Asegúrate de que el servidor Colab esté activo.', 'bot-msg');
            }
            
            scrollToBottom();
        }

        function appendMessage(text, className) {
            const messagesContainer = document.getElementById('gemini-chat-messages');
            const messageDiv = document.createElement('div');
            const msgId = 'msg-' + Date.now();
            
            messageDiv.className = `gemini-msg ${className}`;
            messageDiv.id = msgId;
            // Reemplazar saltos de línea para que se vean bien en el HTML
            messageDiv.innerHTML = text.replace(/\n/g, '<br>');
            
            messagesContainer.appendChild(messageDiv);
            return msgId;
        }

        function removeMessage(id) {
            const element = document.getElementById(id);
            if (element) element.remove();
        }

        function scrollToBottom() {
            const messagesContainer = document.getElementById('gemini-chat-messages');
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    </script>
